<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inventory Balancer - Selectable Export</title>
    <style>
        :root {
            --donor-bg: #eff6ff; --donor-text: #1e40af;
            --receiver-bg: #fff7ed; --receiver-text: #9a3412;
            --neutral-bg: #f8fafc;
        }
        body { font-family: -apple-system, sans-serif; background: #f1f5f9; padding: 20px; color: #1a202c; margin: 0; }
        .container { max-width: 1700px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #edf2f7; padding-bottom: 20px; margin-bottom: 20px; }
        
        .controls { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        select { padding: 8px 12px; border-radius: 6px; border: 1px solid #cbd5e0; background: white; font-size: 0.9rem; min-width: 250px; }

        .export-btn { background: #10b981; color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .export-btn:hover { background: #059669; }
        .export-btn:disabled { background: #a7f3d0; cursor: not-allowed; }

        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { padding: 20px; border-radius: 10px; color: white; }
        .blue { background: #2563eb; } .green { background: #10b981; } .orange { background: #f59e0b; }
        .card h2 { margin: 5px 0 0; font-size: 1.8rem; }

        .upload-btn { background: white; border: 2px dashed #cbd5e0; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        #csvFile { display: none; }

        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #e2e8f0; max-height: 650px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1500px; table-layout: auto; }
        th { position: sticky; top: 0; z-index: 10; padding: 12px 15px; text-align: left; font-size: 0.7rem; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid #e2e8f0; }
        
        .col-donor-head { background: var(--donor-bg); color: var(--donor-text); }
        .col-receiver-head { background: var(--receiver-bg); color: var(--receiver-text); }
        .col-neutral-head { background: var(--neutral-bg); color: #475569; }

        td { padding: 10px 15px; border-bottom: 1px solid #edf2f7; font-size: 0.85rem; line-height: 1.4; vertical-align: top; }
        .col-donor { background-color: rgba(239, 246, 255, 0.4); font-weight: 500; }
        .col-receiver { background-color: rgba(255, 247, 237, 0.4); font-weight: 500; }

        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .badge-qty { background: #dcfce7; color: #166534; }
        .badge-cost { background: #1e293b; color: white; }

        input[type="checkbox"] { transform: scale(1.2); cursor: pointer; }
        .selected-row { background-color: #f0fdf4 !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Inventory Balancing Master <small style="font-size:0.4em; opacity:0.6;">v2.5 Selectable Export</small></h1>
        <label class="upload-btn" for="csvFile">📁 Load CSV <input type="file" id="csvFile" accept=".csv"></label>
    </div>

    <div class="controls">
        <div style="display:flex; align-items:center; gap:10px;">
            <label style="font-weight:bold; font-size:0.8rem;">FILTER RECEIVER:</label>
            <select id="locationFilter" onchange="filterAndRender()">
                <option value="ALL">Show All Locations</option>
            </select>
        </div>
        <div>
            <span id="selectCount" style="margin-right:15px; font-size:0.9rem; font-weight:bold; color:#10b981;">0 items selected</span>
            <button id="exportBtn" class="export-btn" onclick="exportToCSV()" disabled>⬇ Export Selected (SKU & Qty)</button>
        </div>
    </div>

    <div class="stats">
        <div class="card blue"><small>TOTAL OPPORTUNITIES</small><h2 id="oppCount">0</h2></div>
        <div class="card green"><small>VALUE OF CURRENT VIEW</small><h2 id="totalValue">$0.00</h2></div>
        <div class="card orange"><small>UNITS IN CURRENT VIEW</small><h2 id="totalUnits">0</h2></div>
    </div>

    <div class="table-wrapper">
        <table id="mainTable">
            <thead>
                <tr>
                    <th class="col-neutral-head" style="width:40px; cursor:default;"><input type="checkbox" id="masterBox" onclick="toggleAll(this)"></th>
                    <th class="col-neutral-head" onclick="resort('name')">Product Name</th>
                    <th class="col-neutral-head" onclick="resort('sku')">SKU</th>
                    <th class="col-donor-head" onclick="resort('from')">From (Donor)</th>
                    <th class="col-donor-head" onclick="resort('donorStock')">D.Stock</th>
                    <th class="col-donor-head" onclick="resort('donorAvr')">D.AVR</th>
                    <th class="col-receiver-head" onclick="resort('to')">To (Receiver)</th>
                    <th class="col-receiver-head" onclick="resort('targetStock')">R.Stock</th>
                    <th class="col-receiver-head" onclick="resort('targetAvr')">R.AVR</th>
                    <th class="col-neutral-head" onclick="resort('qty')">Qty</th>
                    <th class="col-neutral-head" onclick="resort('cost')">Value</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    let masterTransfers = [];
    let currentlyFiltered = [];
    let sortState = { key: '', asc: true };

    function parseCSV(text) {
        const rows = [];
        const lines = text.split(/\r?\n/);
        for (let line of lines) {
            if (!line.trim()) continue;
            const values = []; let current = '', inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
                else current += char;
            }
            values.push(current.trim()); rows.push(values);
        }
        return rows;
    }

    document.getElementById('csvFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const rows = parseCSV(event.target.result);
            processData(rows);
        };
        reader.readAsText(e.target.files[0]);
    });

    function processData(rows) {
        const raw = rows.slice(1).filter(r => r.length >= 12).map(r => ({
            loc: r[0], sku: r[3], name: r[2], price: parseFloat(r[8]) || 0,
            avr: parseFloat(r[10]) || 0, stock: parseFloat(r[11]) || 0, days: parseInt(r[12]) || 0
        }));

        const grouped = {};
        const locations = new Set();
        raw.forEach(item => { 
            if(!grouped[item.sku]) grouped[item.sku] = []; 
            grouped[item.sku].push(item);
            locations.add(item.loc);
        });

        const select = document.getElementById('locationFilter');
        select.innerHTML = '<option value="ALL">Show All Locations</option>';
        Array.from(locations).sort().forEach(loc => {
            select.innerHTML += `<option value="${loc}">${loc}</option>`;
        });

        masterTransfers = [];
        let idCounter = 0;
        for (const sku in grouped) {
            const stores = grouped[sku];
            const surplus = stores.filter(s => s.days > 45 && s.stock > 10).sort((a,b) => b.stock - a.stock);
            const deficit = stores.filter(s => s.days < 14);

            deficit.forEach(target => {
                if (surplus.length > 0) {
                    const donor = surplus[0];
                    let moveQty = Math.ceil((target.avr * 30) - target.stock);
                    const donorSafe = Math.floor(donor.stock - (donor.avr * 30));
                    moveQty = Math.min(moveQty, donorSafe);

                    if (moveQty > 0) {
                        masterTransfers.push({
                            id: idCounter++,
                            selected: false,
                            name: target.name, sku: target.sku, from: donor.loc, donorStock: donor.stock, donorAvr: donor.avr,
                            to: target.loc, targetStock: target.stock, targetAvr: target.avr, qty: moveQty, cost: moveQty * donor.price
                        });
                    }
                }
            });
        }
        filterAndRender();
    }

    function toggleAll(master) {
        currentlyFiltered.forEach(t => t.selected = master.checked);
        renderTableOnly();
        updateUI();
    }

    function toggleRow(id) {
        const item = masterTransfers.find(t => t.id === id);
        if(item) item.selected = !item.selected;
        updateUI();
    }

    function resort(key) {
        sortState.asc = (sortState.key === key) ? !sortState.asc : true;
        sortState.key = key;
        masterTransfers.sort((a, b) => {
            let valA = a[key], valB = b[key];
            if (typeof valA === 'string') return sortState.asc ? valA.localeCompare(valB) : valB.localeCompare(valA);
            return sortState.asc ? valA - valB : valB - valA;
        });
        filterAndRender();
    }

    function filterAndRender() {
        const filterVal = document.getElementById('locationFilter').value;
        currentlyFiltered = filterVal === 'ALL' ? masterTransfers : masterTransfers.filter(t => t.to === filterVal);
        document.getElementById('masterBox').checked = false;
        
        let grandValue = 0, grandUnits = 0;
        currentlyFiltered.forEach(t => { grandValue += t.cost; grandUnits += t.qty; });

        renderTableOnly();
        
        document.getElementById('oppCount').innerText = currentlyFiltered.length;
        document.getElementById('totalUnits').innerText = grandUnits.toLocaleString();
        document.getElementById('totalValue').innerText = '$' + grandValue.toLocaleString(undefined, {minimumFractionDigits:2});
        updateUI();
    }

    function renderTableOnly() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = currentlyFiltered.map(t => `
            <tr class="${t.selected ? 'selected-row' : ''}">
                <td><input type="checkbox" ${t.selected ? 'checked' : ''} onclick="toggleRow(${t.id})"></td>
                <td><b>${t.name}</b></td>
                <td><small>${t.sku}</small></td>
                <td class="col-donor">${t.from}</td>
                <td class="col-donor">${t.donorStock}</td>
                <td class="col-donor">${t.donorAvr.toFixed(2)}</td>
                <td class="col-receiver">${t.to}</td>
                <td class="col-receiver"><b style="color:#e53e3e">${t.targetStock}</b></td>
                <td class="col-receiver">${t.targetAvr.toFixed(2)}</td>
                <td><span class="badge badge-qty">${t.qty}</span></td>
                <td><span class="badge badge-cost">$${t.cost.toFixed(2)}</span></td>
            </tr>`).join('');
    }

    function updateUI() {
        const selectedCount = masterTransfers.filter(t => t.selected).length;
        document.getElementById('selectCount').innerText = `${selectedCount} items selected`;
        document.getElementById('exportBtn').disabled = selectedCount === 0;
    }

    function exportToCSV() {
        const toExport = masterTransfers.filter(t => t.selected);
        if (toExport.length === 0) return;
        
        const headers = ["SKU", "Quantity"];
        const rows = toExport.map(t => [`"${t.sku}"`, t.qty]);

        let csvContent = "data:text/csv;charset=utf-8," 
            + headers.join(",") + "\n"
            + rows.map(e => e.join(",")).join("\n");

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", "Selected_Transfers_SKU_Qty.csv");
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }
</script>
</body>
</html>
